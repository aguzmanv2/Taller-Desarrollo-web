<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LimpioShop - E-commerce de Limpieza</title>
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>
  <header class="header">
    <div class="topbar">
      <div class="container topbar-content">
        <a href="#" class="brand">LimpioShop</a>

        <div class="search-wrap">
          <input id="search-input" type="text" placeholder="Buscar productos de limpieza">
        </div>

        <button id="open-cart-btn" class="cart-btn">
          Carrito (<span id="cart-count">0</span>)
        </button>
      </div>
    </div>

    <div class="subbar">
      <div class="container subbar-content">
        <span>Ofertas del dia</span>
        <span>Novedades</span>
        <span>Hogar y Cocina</span>
        <span>Empresas</span>
        <span>Ayuda</span>
      </div>
    </div>
  </header>

  <main class="container layout">
    <aside class="panel filters-panel">
      <h2>Refina tu busqueda</h2>

      <label for="category-filter">Categoria</label>
      <select id="category-filter">
        <option value="all">Todas</option>
      </select>

      <label for="sort-filter">Ordenar por</label>
      <select id="sort-filter">
        <option value="default">Relevancia</option>
        <option value="price-asc">Precio: menor a mayor</option>
        <option value="price-desc">Precio: mayor a menor</option>
        <option value="name-asc">Nombre: A-Z</option>
      </select>

      <button id="clear-filters-btn" class="secondary-btn">Limpiar filtros</button>
    </aside>

    <section class="products-section">
      <h2>Resultados para limpieza del hogar</h2>
      <div id="products-grid" class="products-grid"></div>
    </section>
  </main>

  <div id="cart-drawer" class="cart-drawer" aria-hidden="true">
    <div class="cart-header">
      <h2>Tu carrito</h2>
      <button id="close-cart-btn" class="icon-btn" aria-label="Cerrar carrito">X</button>
    </div>

    <div id="cart-items" class="cart-items"></div>

    <div class="cart-footer">
      <p>Total: <strong id="cart-total">$0.00</strong></p>
      <button id="checkout-btn" class="primary-btn">Finalizar compra</button>
      <button id="empty-cart-btn" class="secondary-btn">Vaciar carrito</button>
    </div>
  </div>

  <div id="overlay" class="overlay" aria-hidden="true"></div>

  <div id="toast" class="toast"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
